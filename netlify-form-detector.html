<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="robots" content="noindex">
  <title>Form Detector</title>
</head>
<body>
  <form name="workflow-review" method="POST" action="/" data-netlify="true" netlify netlify-honeypot="company_website" hidden>
    <input type="hidden" name="form-name" value="workflow-review">
    <input name="company_website">
    <input name="name">
    <input type="email" name="email">
    <input name="company">
    <textarea name="workflow"></textarea>
  </form>
</body>
</html>
